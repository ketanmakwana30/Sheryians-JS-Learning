<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input to create card</title>
    <style>
        body {
            height: 90vh;
            width: 98%;
            font-family:
                "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
                "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
                background-color: #333;
        }

        #main {
            height: 100%;
            width: 100%;
        }

        .card {
            height: 350px;
            width: 300px;
            display: flex;
            justify-content: space-evenly;
            align-items:center;
            flex-direction: column;
            border-radius: 8px;
            border: 2px  solid #222;
        }
       
        .profile {
            height: 70px;
            width: 70px;
            border-radius: 50%;
            overflow: hidden;
        }

        .profile img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        form {
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input {
            padding: 10px 30px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="Profile Pic" />
            <input type="text" placeholder="Name" />
            <input type="text" placeholder="Occupation" />
            <input type="text" placeholder="Info" />
            <input type="submit" name="" id="" />
        </form>
        

    <script src="app.js"></script>
</body>

</html>
