<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        body {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }

        .main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 3rem;
            color: #fff;
        }

        button {
            padding: 15px 30px;
            outline: none;
            border: none;
            background-color: #35adeec4;
            color: #111;
            font-weight: bolder;
            font-size: 1rem;
            border-radius: 5px;
            transition: all 0.2s linear;
        }
        
        button:hover {
            background-color: #35adee98;
            cursor: pointer;    
        }
    </style>
</head>
<body>
    <div class="main">
        <h1><span></span></h1>
        <button>Start Counter</button>
    </div>

        
    <script src="script.js"></script>
</body>
</html>
